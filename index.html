<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About [Me]</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 What is my favorite movie?
        <select id="movie-answer">
          <option value="movie1">fight club</option>
          <option value="movie2">goodwill hunting</option>
          <option value="movie3">call me by your name</option>
          <option value="movie4">Mid 90s</option>
        </select>
      </label>
      <button type="submit">Check Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        📖 What is my favorite book?
        <select id="book-answer">
          <option value="book1">57 bus</option>
          <option value="book2">The Great Gatsby</option>
          <option value="book3">Hitch hikers guide to the galaxy</option>
          <option value="book4">Who reads books anymore?!?</option>
        </select>
      </label>
      <button type="submit">Check Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie2") {
          $("#movie-text").text("YESSSS!");
        } 
        else {
          $("#movie-text").text("Good guess that movie is still valid");
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book4") {
          $("#book-text").text("YESSSS!");
        } 
        else {
          $("#book-text").text("Psh you thought");
        }
      });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
